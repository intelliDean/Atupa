[package]
name        = "atupa"
version     = { workspace = true }
edition     = { workspace = true }
authors     = { workspace = true }
license     = { workspace = true }
description = "atupa — Unified EVM + Stylus Execution Profiler CLI"
readme      = { workspace = true }

# Standalone binary target
# 
# The binary is automatically inferred from src/main.rs as "atupa"


[dependencies]
# Atupa SDK
atupa-sdk     = { workspace = true }
atupa-core    = { workspace = true }
atupa-nitro   = { workspace = true }
atupa-rpc     = { workspace = true }
atupa-aave    = { workspace = true }
atupa-lido    = { workspace = true }
atupa-parser  = { workspace = true }
atupa-output  = { workspace = true }

# CLI
clap = { workspace = true }

# Async
tokio = { workspace = true }

# Serialization
serde      = { workspace = true }
serde_json = { workspace = true }
toml       = { workspace = true }

# UX & Embedded
anyhow    = { workspace = true }
log         = { workspace = true }
env_logger  = { workspace = true }
colored     = { workspace = true }
indicatif   = { workspace = true }
open        = { workspace = true }
axum        = { workspace = true }
tower-http  = { workspace = true }
rust-embed  = { workspace = true }
mime_guess  = { workspace = true }
